name: Sync to HuggingFace Hub

on:
  push:
    branches: [main]

jobs:
  upload-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Upload model artifacts to HuggingFace Hub
        env:
          HF_TOKEN:      ${{ secrets.HF_TOKEN }}
          HF_MODEL_REPO: ${{ secrets.HF_MODEL_REPO }}
        run: |
          python - <<'EOF'
          import os
          from huggingface_hub import HfApi

          api      = HfApi()
          repo_id  = os.environ["HF_MODEL_REPO"]
          token    = os.environ["HF_TOKEN"]

          artifacts = [
              "outputs/best_model.pth",
              "outputs/scaler.pkl",
          ]

          for path in artifacts:
              if not os.path.exists(path):
                  print(f"⚠️  Skipping {path} — not found in repo")
                  continue
              filename = os.path.basename(path)
              print(f"📤 Uploading {filename}...")
              api.upload_file(
                  path_or_fileobj = path,
                  path_in_repo    = filename,
                  repo_id         = repo_id,
                  repo_type       = "model",
                  token           = token,
                  commit_message  = f"ci: update {filename}",
              )
              print(f"✅ https://huggingface.co/{repo_id}/blob/main/{filename}")
          EOF