name: Keep Render Alive

on:
  schedule:
    - cron: "*/14 * * * *"   # every 14 minutes
  workflow_dispatch:          # manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://credit-risk-dnn.onrender.com/health)
          echo "Render health check status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Render returned $STATUS"
            exit 1
          fi
          echo "✅ Render is awake"