name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    # This tells GitHub to run all steps in this job inside your frontend folder!
    defaults:
      run:
        working-directory: ./credit-risk-frontend

    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Frontend Dependencies
        run: npm install
        
      - name: Build Next.js App
        run: npm run build

  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          
          # This safely checks where your Python requirements.txt is located
          if [ -f requirements.txt ]; then 
            pip install -r requirements.txt
          elif [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          elif [ -f credit-risk-backend/requirements.txt ]; then
            pip install -r credit-risk-backend/requirements.txt
          else
            echo "No requirements.txt found yet. Skipping python dependencies."
          fi