version: "3.9"

services:

  api:
    build: .
    container_name: credit_risk_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./outputs:/app/outputs   # persist model weights
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build: .
    container_name: credit_risk_ui
    command: streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./outputs:/app/outputs
    environment:
      - API_URL=http://api:8000   # internal docker network
    depends_on:
      - api
    restart: unless-stopped